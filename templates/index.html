<!DOCTYPE html>
<html>
<head>
    <title>CLIHealth Server Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 15px;
            width: 250px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        canvas {
            margin-top: 10px;
        }

        .anomaly {
            margin-top: 30px;
        }

        .anomaly h2 {
            margin-bottom: 10px;
        }

        .status {
            font-size: 22px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h1>🚀 CLIHealth</h1>

<div class="container">

    <div class="card">
        <h2>CPU Usage</h2>
        <canvas id="cpuChart"></canvas>
    </div>

    <div class="card">
        <h2>Memory Usage</h2>
        <canvas id="memChart"></canvas>
    </div>

    <div class="card">
        <h2>Disk Usage</h2>
        <canvas id="diskChart"></canvas>
    </div>

</div>

<!-- 🚨 ANOMALY SECTION -->
<div class="anomaly">
    <h2>🚨 Anomaly Status</h2>
    <div class="status">{{ anomaly }}</div>
</div>

<script>
    const cpu = {{ cpu }};
    const memory = {{ memory }};
    const disk = {{ disk }};

    function createChart(id, value, label) {
        new Chart(document.getElementById(id), {
            type: 'doughnut',
            data: {
                labels: [label, "Remaining"],
                datasets: [{
                    data: [value, 100 - value]
                }]
            },
            options: {
                plugins: {
                    legend: {
                        labels: {
                            color: "white"
                        }
                    }
                }
            }
        });
    }

    createChart('cpuChart', cpu, 'CPU');
    createChart('memChart', memory, 'Memory');
    createChart('diskChart', disk, 'Disk');

    // Auto refresh
    setTimeout(() => location.reload(), 3000);
</script>

</body>
</html>
